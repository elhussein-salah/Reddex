name: Deploy to EC2

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Deploy
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            set -e

            cd ~/Reddex

            echo "Pull latest code"
            git pull origin main

            echo "Install deps"
            npm ci

            echo "Build"
            npm run build

            echo "Prisma migrate"
            npx prisma migrate deploy || true

            echo "Restart app"
            pm2 reload reddex || pm2 start dist/src/main.js --name reddex

            pm2 save
          EOF